services:
  postgres:
    image: postgres:16-alpine
    container_name: leyla_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME:-leyladigital}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-leyladigital}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - leyla_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: leyla_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.example # Use example as default, override with .env if needed
      - .env
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
    ports:
      - "${PORT:-4000}:${PORT:-4000}"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - leyla_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-4000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: leyla_frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env.example
      - .env
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_PORT=3000
    networks:
      - leyla_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  leyla_network:
    driver: bridge

volumes:
  pgdata:
